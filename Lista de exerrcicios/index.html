<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <title>Lista de exercicios</title>
</head>
<body>
    <h1>Lista de exercicios</h1>
    
    <main>
        <section>
            <h2>1- Encontre o Triangulo</h2>
        
            <label for="inputX">Informe o valor de X:</label>
            <input type="number" id="inputX" name="inputX" placeholder="X">
        
            <label for="inputY">Informe o valor de Y:</label>
            <input type="number" id="inputY" name="inputY" placeholder="Y">
        
            <label for="inputZ">Informe o valor de Z:</label>
            <input type="number" id="inputZ" name="inputZ" placeholder="Z">
        
            <div class="resultado">
                <button id="btnTriangulo">Verificar Triangulo</button>
                <input type="text" id="resultadoTriangulo" placeholder="Resultado" readonly>
            </div>
        </section>
        <section>
            <h2>2- Calculadora IMC</h2>
            
            <label for="peso">Informe seu peso atual(KG):</label>
            <input type="number" id="inputPeso" name="peso">

            <label for="altura">Informa sua altura(em metros):</label>
            <input type="number" id="inputAltura" name="">

            <button id="btnIMC">Calcular IMC</button>

            <h3 id="resultadoIMC">Seu IMC: 00.00</h3>
            <h3 id="statusIMC">Classificação</h3>

        </section>

        <section>
            <h2>3- Calculadora de Impostos</h2>

            <label for="ano_carro">Informe o ano de fabricação do veículo</label>
            <input type="number" id="inputAnoFabricacao" name="ano_carro">
            
            <label for="valor_tabela">Informe o valor de tabela do veiculo</label>
            <input type="number" id="inputTabela" name="valor_tabela">

            <button id="btnImpostoVeiculo">Verificar imposto</button>

            <div class="resultado">
                <label for="resultadoImpostoVeiculo">Valor do imposto:</label>
                <input type="text" id="resultadoImpostoVeiculo" readonly>
            </div>

        </section>
    </main>

</body>
<script src="JS/script.js"></script>
</html>
